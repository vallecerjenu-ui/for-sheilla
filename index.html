<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Sheilla ❤️</title>
<style>
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #ffdde1;
    font-family: Arial, sans-serif;
    overflow: hidden;
  }

  .card {
    text-align: center;
    background: white;
    padding: 30px;
    border-radius: 20px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.2);
  }

  h1 {
    color: #ff4d6d;
  }

  button {
    margin: 10px;
    padding: 10px 20px;
    border: none;
    border-radius: 10px;
    background: #ff4d6d;
    color: white;
    font-size: 16px;
    cursor: pointer;
    position: relative;
  }

  #noBtn {
    position: absolute;
  }

  #message {
    display: none;
    margin-top: 15px;
    font-size: 18px;
    color: #e63950;
  }

  .heart {
    position: absolute;
    color: red;
    font-size: 20px;
    animation: float 5s linear infinite;
  }

  @keyframes float {
    from {
      transform: translateY(100vh);
      opacity: 1;
    }
    to {
      transform: translateY(-10vh);
      opacity: 0;
    }
  }
</style>
</head>

<body>

<div class="card">
  <h1>Sheilla ❤️</h1>
  <p>Will you marry me?</p>

  <button onclick="yesClicked()">Yes 💍</button>
  <button id="noBtn" onmouseover="moveNo()">No 😅</button>

  <div id="message">You just made me the happiest person alive! 💖</div>
</div>

<script>
function yesClicked() {
  document.getElementById("message").style.display = "block";
}

function moveNo() {
  const btn = document.getElementById("noBtn");
  const x = Math.random() * (window.innerWidth - 100);
  const y = Math.random() * (window.innerHeight - 50);

  btn.style.left = x + "px";
  btn.style.top = y + "px";
}

setInterval(() => {
  const heart = document.createElement("div");
  heart.classList.add("heart");
  heart.innerText = "❤️";
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = Math.random() * 20 + 10 + "px";
  document.body.appendChild(heart);

  setTimeout(() => {
    heart.remove();
  }, 5000);
}, 300);
</script>

</body>
</html>
